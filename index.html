<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NutriLog</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--bg:#F7F5F1;--card:#FFF;--border:#E8E3DB;--text:#1A1614;--muted:#7B766F;--green:#1B4D2E;--glt:#EBF5EE;--orange:#D4520C;--olt:#FEF0E7;--r:12px;--tbh:72px;--hdh:64px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}

/* App shell – flex column fills viewport. This avoids the iOS Safari bug
   where position:fixed scroll containers misfire click coordinates. */
#app{position:fixed;inset:0;display:flex;flex-direction:column;
  padding-top:env(safe-area-inset-top,0);
  padding-bottom:env(safe-area-inset-bottom,0);}

/* Header */
#hdr{flex-shrink:0;height:var(--hdh);padding:0 20px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--border);}
.hdr-date-sm{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.hdr-date-lg{font-size:17px;font-weight:700;line-height:1.2;}
.brand{font-size:20px;font-weight:800;letter-spacing:-.04em;color:var(--green);}
.brand span{color:var(--text);}

/* Main – flex:1 so it fills exactly the space between header and tabs */
#main{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;padding:16px 16px 24px;}

/* Tabs */
#tabs{flex-shrink:0;height:var(--tbh);background:var(--card);border-top:1.5px solid var(--border);display:flex;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:10px;font-family:'Outfit',sans-serif;font-weight:600;letter-spacing:.04em;text-transform:uppercase;transition:color .15s;}
.tab svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;}
.tab.active{color:var(--green);}

/* Cards */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin-bottom:12px;}
.sec{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;margin-top:4px;}

/* Kcal big display */
.kcal-hero{text-align:center;padding:20px 0 12px;}
.kcal-num{font-family:'DM Mono',monospace;font-size:52px;font-weight:500;line-height:1;transition:color .3s;}
.kcal-num.over{color:var(--orange);}
.kcal-sub{font-size:13px;color:var(--muted);margin-top:5px;}
.prog-wrap{margin-top:10px;}
.prog-bar{height:7px;background:var(--border);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;transition:width .4s ease;background:var(--green);}
.prog-fill.over{background:var(--orange);}
.macros-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
.mc{text-align:center;}
.mc-lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.mc-val{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;margin-top:2px;}
.mc-tgt{font-size:10px;color:var(--muted);}

/* Log items */
.log-item{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);}
.log-item:last-child{border-bottom:none;}
.log-nfo{flex:1;min-width:0;}
.log-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.log-det{font-size:12px;color:var(--muted);margin-top:1px;}
.log-kcal{font-family:'DM Mono',monospace;font-size:14px;color:var(--muted);margin-right:10px;white-space:nowrap;}
.log-del{width:26px;height:26px;border-radius:50%;border:none;background:#F0EDE7;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:var(--muted);}

/* FAB */
#fab{position:fixed;right:20px;bottom:calc(var(--tbh) + 14px + env(safe-area-inset-bottom,0));width:50px;height:50px;border-radius:50%;border:none;background:var(--green);color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 18px rgba(27,77,46,.35);display:flex;align-items:center;justify-content:center;z-index:90;transition:transform .15s,box-shadow .15s;}
#fab:active{transform:scale(.93);box-shadow:0 2px 8px rgba(27,77,46,.3);}

/* Modal overlay + sheet */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
.ov.open{opacity:1;pointer-events:all;}
.sheet{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:20px 20px 0 0;z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:93vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,0);}
.sheet.open{transform:translateY(0);}
.sh-handle{width:36px;height:4px;background:#D0CBC1;border-radius:2px;margin:10px auto 0;flex-shrink:0;}
.sh-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;flex-shrink:0;border-bottom:1px solid var(--border);}
.sh-title{font-size:17px;font-weight:600;}
.sh-close{border:none;background:none;font-size:26px;cursor:pointer;color:var(--muted);padding:0;line-height:1;}
.sh-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}

/* Segment */
.seg{display:flex;background:var(--bg);border-radius:8px;padding:3px;margin:12px 20px;}
.seg-btn{flex:1;padding:7px;border:none;background:none;border-radius:6px;font-size:13px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;color:var(--muted);transition:all .15s;}
.seg-btn.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1);}

/* Inputs */
.si{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none;}
.si:focus{border-color:var(--green);}
.fg{padding:0 20px 14px;}
.fl{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.grid4 .si,.grid4 input{padding:10px 8px;text-align:center;font-size:15px;}

/* Buttons */
.btn-p{display:block;width:calc(100% - 40px);margin:0 20px 14px;padding:14px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;transition:opacity .15s;text-align:center;}
.btn-p:active{opacity:.85;}
.btn-s{display:block;width:calc(100% - 40px);margin:0 20px 12px;padding:12px;background:var(--bg);color:var(--green);border:1.5px solid var(--green);border-radius:12px;font-size:15px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;}

/* Food search list */
.sw{padding:0 20px 10px;}
.food-li{display:flex;align-items:center;padding:10px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.food-li:active{background:#F7F5F1;}
.food-li:last-child{border-bottom:none;}
.fl-info{flex:1;min-width:0;}
.fl-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fl-meta{font-size:12px;color:var(--muted);margin-top:1px;}
.fl-kcal{font-family:'DM Mono',monospace;font-size:13px;color:var(--muted);flex-shrink:0;margin-right:6px;}

/* Menge screen */
.menge-screen{padding:20px;}
.mg-name{font-size:18px;font-weight:600;margin-bottom:3px;}
.mg-meta{font-size:13px;color:var(--muted);margin-bottom:20px;}
.mg-inp{width:100%;padding:16px;text-align:center;border:2px solid var(--green);border-radius:12px;font-size:28px;font-family:'DM Mono',monospace;font-weight:500;background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none;}
.mg-preview{text-align:center;font-size:14px;color:var(--muted);margin:10px 0 22px;}
.mg-back{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--muted);cursor:pointer;margin-bottom:16px;background:none;border:none;font-family:'Outfit',sans-serif;padding:0;}

/* Barcode / manual */
.bc-row{display:flex;gap:8px;padding:0 20px 10px;}
.bc-inp{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none;}
.bc-inp:focus{border-color:var(--green);}
.bc-btn{padding:11px 16px;border:none;border-radius:10px;background:var(--green);color:#fff;font-size:14px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;white-space:nowrap;}
.bc-camera{position:relative;margin:0 20px 12px;border:1.5px solid var(--border);border-radius:16px;overflow:hidden;background:#000;min-height:180px;display:none;}
.bc-camera.open{display:block;}
.bc-camera video{width:100%;height:auto;display:block;}
.bc-close{position:absolute;top:12px;right:12px;border:none;background:rgba(0,0,0,.5);color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cam-hint{position:absolute;bottom:12px;left:12px;padding:6px 10px;background:rgba(0,0,0,.55);color:#fff;font-size:12px;border-radius:999px;}
.status{padding:0 20px 10px;font-size:13px;color:var(--muted);}
.status.ok{color:var(--green);}
.status.err{color:var(--orange);}

/* Verlauf */
.chart-box{height:190px;position:relative;padding:4px 0;}
.hist-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.hist-row:last-child{border-bottom:none;}
.hist-dot{width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:10px;flex-shrink:0;}
.hist-dot.over{background:var(--orange);}
.hist-date{font-size:12px;color:var(--muted);width:72px;flex-shrink:0;}
.hist-kcal{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;flex:1;}
.hist-kcal.over{color:var(--orange);}
.hist-mac{font-size:11px;color:var(--muted);text-align:right;}
.stat3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.scard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.scard-v{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;}
.scard-l{font-size:10px;color:var(--muted);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}

/* Database */
.kat-bar{display:flex;gap:6px;overflow-x:auto;padding:0 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.kat-bar::-webkit-scrollbar{display:none;}
.kchip{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:600;background:var(--card);white-space:nowrap;cursor:pointer;font-family:'Outfit',sans-serif;color:var(--muted);transition:all .15s;flex-shrink:0;}
.kchip.active{background:var(--green);color:#fff;border-color:var(--green);}
.db-item{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);}
.db-item:last-child{border-bottom:none;}
.db-nfo{flex:1;min-width:0;}
.db-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.db-meta{font-size:12px;color:var(--muted);margin-top:1px;}
.db-kcal{font-family:'DM Mono',monospace;font-size:13px;color:var(--muted);margin-right:8px;flex-shrink:0;}
.db-del{width:26px;height:26px;border-radius:50%;border:none;background:#F0EDE7;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:var(--muted);}

/* Settings */
.set-row{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);}
.set-lbl{flex:1;font-size:15px;font-weight:500;}
.set-inp{width:82px;padding:7px 10px;text-align:right;border:1.5px solid var(--border);border-radius:8px;font-size:16px;font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none;}
.set-inp:focus{border-color:var(--green);}
.set-btn{padding:10px 14px;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;}

/* Misc */
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.badge{display:inline-block;padding:2px 7px;border-radius:12px;font-size:11px;font-weight:600;}
.bg-kat{background:#F0EDE7;color:var(--muted);}
.bg-green{background:var(--glt);color:var(--green);}
</style>
</head>
<body>

<div id="app">
<div id="hdr">
  <div>
    <div class="hdr-date-sm" id="hdr-wd"></div>
    <div class="hdr-date-lg" id="hdr-d"></div>
  </div>
  <div class="brand">NUTRI<span>LOG</span></div>
</div>

<div id="main"></div>

<nav id="tabs">
  <button class="tab active" data-t="heute" onclick="switchTab('heute')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>Heute
  </button>
  <button class="tab" data-t="verlauf" onclick="switchTab('verlauf')">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Verlauf
  </button>
  <button class="tab" data-t="db" onclick="switchTab('db')">
    <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4.03 3-9 3S3 13.66 3 12"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/></svg>Datenbank
  </button>
  <button class="tab" data-t="cfg" onclick="switchTab('cfg')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Einstellungen
  </button>
</nav>
</div><!-- #app -->

<button id="fab" onclick="openAdd()">+</button>

<!-- Add Entry Sheet -->
<div class="ov" id="add-ov" onclick="closeAdd()"></div>
<div class="sheet" id="add-sh">
  <div class="sh-handle"></div>
  <div class="sh-hdr">
    <span class="sh-title" id="add-title">Hinzufügen</span>
    <button class="sh-close" onclick="closeAdd()">×</button>
  </div>
  <div class="seg">
    <button class="seg-btn active" id="seg-db" onclick="switchAddMode('db')">Aus Datenbank</button>
    <button class="seg-btn" id="seg-bc" onclick="switchAddMode('bc')">Barcode / Manuell</button>
  </div>
  <div class="sh-body" id="add-body"></div>
</div>

<!-- Edit Food Sheet -->
<div class="ov" id="ef-ov" onclick="closeEdit()"></div>
<div class="sheet" id="ef-sh">
  <div class="sh-handle"></div>
  <div class="sh-hdr">
    <span class="sh-title" id="ef-title">Lebensmittel</span>
    <button class="sh-close" onclick="closeEdit()">×</button>
  </div>
  <div class="sh-body" id="ef-body"></div>
</div>

function load(){
  try{

    if(d){const p=JSON.parse(d);Object.assign(S,p);}
  }catch(e){}
  // Always ensure seed foods if empty

  // Seed history from Excel data
  if(!S.history||Object.keys(S.history).length===0){

  S.today=todayISO();
}

// ===================== HELPERS =====================
function calcNutr(food, menge){
  const mult=(food.gew*menge)/100;
  return {kcal:Math.round(food.k*mult*10)/10,fett:Math.round(food.f*mult*10)/10,kh:Math.round(food.c*mult*10)/10,protein:Math.round(food.p*mult*10)/10};
}
function perUnit(food){return calcNutr(food,1);}
function getTotals(date){
  const day=S.days[date];
  if(day&&day.items&&day.items.length){
    return day.items.reduce((a,i)=>({kcal:a.kcal+i.kcal,fett:a.fett+i.fett,kh:a.kh+i.kh,protein:a.protein+i.protein}),{kcal:0,fett:0,kh:0,protein:0});
  }
  return S.history[date]||null;
}
function fmtDE(iso){
  if(!iso) return '';
  const [y,m,d]=iso.split('-');
  const months=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  return `${parseInt(d)}. ${months[parseInt(m)-1]}`;
}
function fmtDELong(iso){
  const days=['So','Mo','Di','Mi','Do','Fr','Sa'];
  const d=new Date(iso);
  return `${days[d.getDay()]}, ${fmtDE(iso)}`;
}
function pct(val,max){return Math.min(100,Math.round(val/max*100));}
function uid(){return 'u'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function r1(n){return Math.round(n*10)/10;}

// ===================== HEADER =====================
function updateHeader(){
  const days=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const months=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const d=new Date();
  document.getElementById('hdr-wd').textContent=days[d.getDay()];
  document.getElementById('hdr-d').textContent=`${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
}

// ===================== TAB SWITCH =====================
function switchTab(t){
  S.activeTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
  document.getElementById('fab').style.display=(t==='heute'||t==='db')?'flex':'none';
  render();
}

// ===================== RENDER =====================
function render(){
  const m=document.getElementById('main');
  if(S.activeTab==='heute') m.innerHTML=renderHeute();
  else if(S.activeTab==='verlauf'){m.innerHTML=renderVerlauf();setTimeout(drawChart,50);}
  else if(S.activeTab==='db') m.innerHTML=renderDB();
  else if(S.activeTab==='cfg') m.innerHTML=renderCfg();
}

function renderHeute(){
  const totals=getTotals(S.today)||{kcal:0,fett:0,kh:0,protein:0};
  const items=(S.days[S.today]&&S.days[S.today].items)||[];
  const {ziel,bedarf}=S.settings;
  const over=totals.kcal>ziel;
  const pKcal=pct(totals.kcal,ziel);
  const pFett=pct(totals.fett,bedarf*0.03); // ~30% of bedarf / 9
  const pKH=pct(totals.kh,bedarf*0.05);   // rough %
  const pProt=pct(totals.protein,bedarf*0.025);
  const tProt=Math.round(bedarf*0.025);

  let itemsHTML='';

  } else {
    itemsHTML=items.map((it,i)=>`
      <div class="log-item">
        <div class="log-nfo">
          <div class="log-name">${it.name}</div>
          <div class="log-det">${it.menge} ${it.einheit} · ${it.fett}g F · ${it.kh}g KH · ${it.protein}g P</div>
        </div>
        <span class="log-kcal">${Math.round(it.kcal)} kcal</span>
        <button class="log-del" onclick="delItem('${S.today}',${i})">×</button>
      </div>`).join('');
  }

  return `
  <div class="card">
    <div class="kcal-hero">
      <div class="kcal-num${over?' over':''}">${Math.round(totals.kcal)}</div>

// ---- VERLAUF ----
function renderVerlauf(){
  const allDays=getAllDays();
  const sorted=Object.keys(allDays).sort().reverse().slice(0,14);
  const {ziel}=S.settings;

  // Stats (last 30 days)
  const last30=Object.keys(allDays).sort().slice(-30).map(d=>allDays[d]);
  const avg=last30.length?Math.round(last30.reduce((a,v)=>a+v.kcal,0)/last30.length):0;
  const avgP=last30.length?Math.round(last30.reduce((a,v)=>a+v.protein,0)/last30.length):0;
  const overDays=last30.filter(v=>v.kcal>ziel).length;

  const rows=sorted.map(d=>{
    const v=allDays[d];
    const over=v.kcal>ziel;
    return `<div class="hist-row">
      <div class="hist-dot${over?' over':''}"></div>
      <div class="hist-date">${fmtDE(d)}</div>
      <div class="hist-kcal${over?' over':''}">${Math.round(v.kcal)} kcal</div>
      <div class="hist-mac">${Math.round(v.protein)}g P · ${Math.round(v.kh)}g KH</div>
    </div>`;
  }).join('');

  return `
  <div class="stat3">
    <div class="scard"><div class="scard-v">${avg}</div><div class="scard-l">Ø kcal</div></div>
    <div class="scard"><div class="scard-v">${avgP}g</div><div class="scard-l">Ø Protein</div></div>
    <div class="scard"><div class="scard-v">${overDays}</div><div class="scard-l">Tage über Ziel</div></div>
  </div>
  <div class="card">
    <div class="sec">Letzter 60 Tage</div>
    <div class="chart-box"><canvas id="kcal-chart"></canvas></div>
  </div>
  <div class="sec">Letzte 14 Tage</div>
  <div class="card">${rows||'<div class="empty">Keine Daten</div>'}</div>
  `;
}

function getAllDays(){
  const merged={};
  Object.assign(merged,S.history);
  Object.entries(S.days).forEach(([d,day])=>{
    if(day.items&&day.items.length){
      const t=day.items.reduce((a,i)=>({kcal:a.kcal+i.kcal,fett:a.fett+i.fett,kh:a.kh+i.kh,protein:a.protein+i.protein}),{kcal:0,fett:0,kh:0,protein:0});
      merged[d]=t;
    }
  });
  return merged;
}

function drawChart(){
  const canvas=document.getElementById('kcal-chart');
  if(!canvas) return;
  if(chartInst){chartInst.destroy();chartInst=null;}
  const allDays=getAllDays();
  const last60=Object.keys(allDays).sort().slice(-60);
  const labels=last60.map(d=>fmtDE(d));
  const data=last60.map(d=>Math.round(allDays[d].kcal));
  const {ziel,bedarf}=S.settings;
  try{
    chartInst=new Chart(canvas,{
      type:'bar',
      data:{
        labels,
        datasets:[
          {label:'kcal',data,backgroundColor:data.map(v=>v>ziel?'rgba(212,82,12,.65)':'rgba(27,77,46,.6)'),borderRadius:3,borderSkipped:false},
          {label:'Ziel',data:last60.map(()=>ziel),type:'line',borderColor:'rgba(212,82,12,.6)',borderWidth:1.5,borderDash:[4,4],pointRadius:0,fill:false},
          {label:'Bedarf',data:last60.map(()=>bedarf),type:'line',borderColor:'rgba(123,118,111,.4)',borderWidth:1.5,borderDash:[2,4],pointRadius:0,fill:false},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.raw} kcal`}}},
        scales:{
          x:{ticks:{font:{size:9},maxRotation:0,maxTicksLimit:8,color:'#7B766F'},grid:{display:false}},
          y:{ticks:{font:{size:9},color:'#7B766F'},grid:{color:'rgba(0,0,0,.05)'}}
        }
      }
    });
  }catch(e){}
}

function setBarcodeStatus(msg, level=''){
  const st=document.getElementById('bc-status');
  if(!st) return;
  st.className='status';
  if(level) st.classList.add(level);
  st.textContent=msg;
}

function showBarcodeCamera(open){
  const cam=document.getElementById('bc-camera');
  if(!cam) return;
  cam.hidden=!open;
  cam.classList.toggle('open', open);
}

function stopBarcodeCamera(){
  if(cameraScanTimer){clearInterval(cameraScanTimer);cameraScanTimer=null;}
  if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null;}
  const video=document.getElementById('bc-video');
  if(video){video.srcObject=null;}
  showBarcodeCamera(false);
}

async function startBarcodeCamera(){
  stopBarcodeCamera();
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    setBarcodeStatus('Kamera nicht verfügbar.', 'err');
    return;
  }
  if(!('BarcodeDetector' in window)){
    setBarcodeStatus('Browser unterstützt keinen Barcode-Scan.', 'err');
    return;
  }
  try{
    if(!barcodeDetector){
      const formats=await BarcodeDetector.getSupportedFormats();
      const supportedFormats=formats.filter(f=>['ean_13','ean_8','upc_e','upc_a'].includes(f));
      if(!supportedFormats.length){
        setBarcodeStatus('Kein gültiges Barcode-Format verfügbar.', 'err');
        return;
      }
      barcodeDetector=new BarcodeDetector({formats:supportedFormats});
    }
    const video=document.getElementById('bc-video');
    if(!video){ setBarcodeStatus('Kamera-Element fehlt.', 'err'); return; }
    setBarcodeStatus('Kamera öffnet…');
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    cameraStream=stream;
    video.srcObject=stream;
    video.play().catch(()=>{});
    showBarcodeCamera(true);
    setBarcodeStatus('Barcode ins Bild halten...', 'ok');
    cameraScanTimer=setInterval(async ()=>{
      if(!video||video.paused||video.readyState<2) return;
      try{
        const codes=await barcodeDetector.detect(video);
        if(codes&&codes.length){
          const code=codes[0].rawValue;
          if(code){
            stopBarcodeCamera();
            document.getElementById('bc-inp').value=code;
            lookupBarcode();
          }
        }
      }catch(e){
        console.warn('Barcode scan error', e);
      }
    },300);
  }catch(e){
    console.warn(e);
    setBarcodeStatus('Kamera konnte nicht gestartet werden.', 'err');
    stopBarcodeCamera();
  }
}

      <div class="fg"><label class="fl">Nährwerte pro 100g</label><div class="grid4">
        <div><div style="font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:700;">kcal</div><input class="si" id="bc-k" type="number" value="${r1(kcal)}" inputmode="decimal"></div>

      </div></div>
      <div class="fg grid2">
        <div><label class="fl">Gramm / Menge</label><input class="si" id="bc-gew" type="number" value="${qty}" inputmode="decimal"></div>
        <div><label class="fl">Einheit</label><input class="si" id="bc-ein" value="Portion"></div>
      </div>
      <button class="btn-p" onclick="addManual(false)">Einmalig hinzufügen</button>
      <button class="btn-s" onclick="addManual(true)">+ In Datenbank speichern</button>`;
    } else {
      st.className='status err';st.textContent='Nicht gefunden. Bitte manuell ausfüllen.';
    }
  }catch(e){
    document.getElementById('bc-status').className='status err';
    document.getElementById('bc-status').textContent='Netzwerkfehler. Bitte manuell ausfüllen.';
  }
}

function addManual(saveDB){
  const name=document.getElementById('bc-name')?.value?.trim()||'Unbekannt';
  const k=parseFloat(document.getElementById('bc-k')?.value)||0;
  const f=parseFloat(document.getElementById('bc-f')?.value)||0;
  const c=parseFloat(document.getElementById('bc-c')?.value)||0;
  const p=parseFloat(document.getElementById('bc-p')?.value)||0;
  const gew=parseFloat(document.getElementById('bc-gew')?.value)||100;
  const ein=document.getElementById('bc-ein')?.value||'Portion';
  const mult=gew/100;
  const entry={name,menge:1,einheit:ein,kcal:r1(k*mult),fett:r1(f*mult),kh:r1(c*mult),protein:r1(p*mult)};
  if(saveDB){
    S.foods.push({id:uid(),kat:'Sonstiges',name,quelle:'',einheit:ein,gew,k,f,c,p});
  }
  addToDay(entry);
  closeAdd();
}

function addToDay(entry){
  if(!S.days[S.today]) S.days[S.today]={items:[]};
  S.days[S.today].items.push(entry);
  save();
  if(S.activeTab==='heute') render();
}

function delItem(date,idx){
  if(!S.days[date]) return;
  S.days[date].items.splice(idx,1);
  save();render();
}

// ===================== EDIT FOOD SHEET =====================
function openEdit(food){
  editFood=food;
  document.getElementById('ef-title').textContent=food?'Bearbeiten':'Neues Lebensmittel';
  const f=food||{id:'',kat:'',name:'',quelle:'',einheit:'Stück',gew:100,k:0,f:0,c:0,p:0};
  const cats=[...getCategories(),...(S.customKats||[])].filter((v,i,a)=>a.indexOf(v)===i).sort((a,b)=>a.localeCompare(b,'de'));
  const opts=cats.map(c=>`<option value="${c}"${c===f.kat?' selected':''}>${c}</option>`).join('');
  document.getElementById('ef-body').innerHTML=`
  <div class="fg" style="margin-top:12px;"><label class="fl">Name</label><input class="si" id="ef-name" value="${f.name}" placeholder="Produktname"></div>
  <div class="fg grid2">
    <div>
      <label class="fl">Kategorie</label>
      <select class="si" id="ef-kat" onchange="toggleNewKat(this.value)" style="-webkit-appearance:auto;">
        <option value="">Wählen…</option>
        ${opts}
        <option value="__new__"${!f.kat?'':''}>+ Neue Kategorie…</option>
      </select>
      <input class="si" id="ef-kat-new" style="display:none;margin-top:8px;" placeholder="Neue Kategorie eingeben">
    </div>
    <div><label class="fl">Quelle</label><input class="si" id="ef-src" value="${f.quelle}" placeholder="Coop, Migros…"></div>
  </div>
  <div class="fg"><label class="fl">Nährwerte pro 100g</label><div class="grid4">
    <div><div style="font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:700;">kcal</div><input class="si" id="ef-k" type="number" value="${f.k}" inputmode="decimal"></div>
    <div><div style="font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:700;">Fett g</div><input class="si" id="ef-f" type="number" value="${f.f}" inputmode="decimal"></div>
    <div><div style="font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:700;">KH g</div><input class="si" id="ef-c" type="number" value="${f.c}" inputmode="decimal"></div>
    <div><div style="font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:700;">Protein g</div><input class="si" id="ef-p" type="number" value="${f.p}" inputmode="decimal"></div>
  </div></div>
  <div class="fg grid2">
    <div><label class="fl">Gewicht pro Einheit (g)</label><input class="si" id="ef-gew" type="number" value="${f.gew}" inputmode="decimal"></div>
    <div><label class="fl">Einheit</label><input class="si" id="ef-ein" value="${f.einheit}" placeholder="Stück, Dose…"></div>
  </div>
  <button class="btn-p" onclick="saveFood('${f.id}')">Speichern</button>
  ${f.id?`<button class="btn-s" style="color:var(--orange);border-color:var(--orange);" onclick="confirmDelFood('${f.id}');closeEdit()">Löschen</button>`:''}
  `;
  document.getElementById('ef-ov').classList.add('open');
  document.getElementById('ef-sh').classList.add('open');
}
function toggleNewKat(val){
  const inp=document.getElementById('ef-kat-new');
  if(inp) inp.style.display=val==='__new__'?'block':'none';
}
function closeEdit(){
  document.getElementById('ef-ov').classList.remove('open');
  document.getElementById('ef-sh').classList.remove('open');
}
function saveFood(existingId){
  let kat=document.getElementById('ef-kat')?.value||'Sonstiges';
  if(kat==='__new__'||kat===''){
    kat=document.getElementById('ef-kat-new')?.value?.trim()||'Sonstiges';
    // persist as custom category
    if(kat&&kat!=='Sonstiges'){if(!S.customKats)S.customKats=[];if(!S.customKats.includes(kat))S.customKats.push(kat);}
  }
  const food={
    id:existingId||uid(),
    kat,
    name:document.getElementById('ef-name')?.value?.trim()||'Unbekannt',
    quelle:document.getElementById('ef-src')?.value?.trim()||'',
    einheit:document.getElementById('ef-ein')?.value?.trim()||'Stück',
    gew:parseFloat(document.getElementById('ef-gew')?.value)||100,
    k:parseFloat(document.getElementById('ef-k')?.value)||0,
    f:parseFloat(document.getElementById('ef-f')?.value)||0,
    c:parseFloat(document.getElementById('ef-c')?.value)||0,
    p:parseFloat(document.getElementById('ef-p')?.value)||0,
  };
  if(existingId){const i=S.foods.findIndex(f=>f.id===existingId);if(i>=0)S.foods[i]=food;else S.foods.push(food);}
  else S.foods.push(food);
  save();closeEdit();render();
}

// ===================== INIT =====================
load();
updateHeader();
// Ensure add sheet body shows default
document.getElementById('add-body').innerHTML='';
render();
// FAB shows only on Heute + DB tabs
document.getElementById('fab').style.display='flex';
</script>
</body>
